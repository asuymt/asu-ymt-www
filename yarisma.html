    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            position: relative;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .container {
            width: 95%;
            max-width: 1400px;
            height: 95vh;
            background: rgba(255, 255, 255, 0.75);
            border-radius: 30px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            padding: 0 40px;
            position: relative;
            overflow: hidden;
        }

        .header {
            position: relative;
            text-align: center;
            margin-bottom: 0px;
            width: 100%;
            overflow: visible;
        }

        .logo {
            width: 100%;
            height: calc(100% - 1rem);
            object-fit: contain;
            position: absolute;
            top: 1rem;
            z-index: -1;
            text-align: center;
        }

        .header .logo {
            width: 100vw;
            height: 90vh;
            margin: 0 auto;
            left: 0;
            top: 5vh;
            position: fixed;
        }

        .community-name {
            font-size: 3em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .event-name {
            font-size: 1.5em;
            color: #764ba2;
            font-weight: 600;
            margin-bottom: 10px;
            position: absolute;
            top: 9rem;
            left: 1rem;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 0.5rem 1rem;
            border-radius: 1rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border: 2px solid #667eea;
        }

        .quiz-title {
            font-size: 3em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            animation: fadeInDown 0.8s;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .progress-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .progress-dot {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
            font-weight: bold;
            color: #666;
            transition: all 0.3s;
        }

        .progress-dot.easy {
            border: 4px solid #4caf50;
        }

        .progress-dot.medium {
            border: 4px solid #ff9800;
        }

        .progress-dot.hard {
            border: 4px solid #f44336;
        }

        .progress-dot.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: scale(1.2);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
        }

        .progress-dot.correct {
            background: #4caf50;
            color: white;
        }

        .progress-dot.wrong {
            background: #f44336;
            color: white;
        }

        .question-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .question-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 1rem 2rem;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .question-number {
            font-size: 1.4em;
            margin-bottom: 15px;
            opacity: 0.9;
        }

        .question-text {
            font-size: 3em;
            font-weight: 600;
            line-height: 1.4;
        }

        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .option-btn {
            background: white;
            color: #333;
            border: 4px solid #0000006e;
            padding: 30px;
            font-size: 2.5em;
            font-weight: 600;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .option-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            border-color: #667eea;
        }

        .option-btn.correct {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
            animation: correctAnim 0.6s;
        }

        .option-btn.wrong {
            background: #f44336;
            color: white;
            border-color: #f44336;
            animation: wrongAnim 0.6s;
        }

        @keyframes correctAnim {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        @keyframes wrongAnim {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px);
            }

            75% {
                transform: translateX(10px);
            }
        }

        .start-screen,
        .end-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #4b74a2 100%);
            border-radius: 30px;
            z-index: 10;
        }

        .start-screen.hidden,
        .end-screen.hidden {
            display: none;
        }

        .start-btn,
        .restart-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 30px 80px;
            font-size: 2.5em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            margin-top: 30px;
        }

        .start-btn:hover,
        .restart-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        .start-title {
            font-size: 4em;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            border-radius: 1rem;
        }

        .start-subtitle {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-align: center;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            border-radius: 1rem;
            padding: 25px;
        }

        .rules {
            font-size: 1.5em;
            text-align: center;
            margin: 30px 50px;
            line-height: 1.8;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            border-radius: 1rem;
            padding: 25px;
        }

        .result-icon {
            font-size: 8em;
            margin-bottom: 20px;
        }

        .result-title {
            font-size: 3.5em;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .result-text {
            font-size: 2em;
            text-align: center;
            margin: 0 50px;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #f0f;
            animation: confetti-fall 3s linear infinite;
        }

        @keyframes confetti-fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .next-btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 30px 60px;
            font-size: 1.8em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            margin: 0 auto;
            display: none;
            right: -300px;
        }

        .next-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .next-btn.visible {
            display: block;
            position: absolute;
            right: 3rem;
            top: 18rem;
            animation: slideInFromRight 0.5s ease-out forwards;
        }

        @keyframes slideInFromRight {
            from {
                right: -300px;
                opacity: 0;
            }

            to {
                right: 3rem;
                opacity: 1;
            }
        }
    </style>
</head>

        let currentQuestionIndex = 0;
        let selectedQuestions = [];
        let correctAnswers = 0;
        let answered = false;
        let autoRestartTimeout = null;

        // Rastgele soru seç
        function getRandomQuestions() {
            const easy = shuffleArray([...questions.easy]).slice(0, 3);
            const mid = shuffleArray([...questions.mid]).slice(0, 2);
            const hard = shuffleArray([...questions.hard]).slice(0, 2);

            return [
                ...easy.map(q => ({ ...q, difficulty: 'easy', label: 'Kolay' })),
                ...mid.map(q => ({ ...q, difficulty: 'medium', label: 'Orta' })),
                ...hard.map(q => ({ ...q, difficulty: 'hard', label: 'Zor' }))
            ];
        }

        // Array'i karıştır
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Yarışmayı başlat
        async function startQuiz() {
            selectedQuestions = getRandomQuestions();
            currentQuestionIndex = 0;
            correctAnswers = 0;

            document.getElementById('startScreen').classList.add('hidden');
            createProgressDots();
            showQuestion();
        }

        // İlerleme noktalarını oluştur
        function createProgressDots() {
            const container = document.getElementById('progressContainer');
            container.innerHTML = '';

            selectedQuestions.forEach((q, index) => {
                const dot = document.createElement('div');
                dot.className = `progress-dot ${q.difficulty}`;
                dot.textContent = index + 1;
                dot.id = `dot-${index}`;
                container.appendChild(dot);
            });
        }

        // Soruyu göster
        function showQuestion() {
            answered = false;
            document.getElementById('nextBtn').classList.remove('visible');

            const question = selectedQuestions[currentQuestionIndex];

            // İlerleme noktasını aktif yap
            document.querySelectorAll('.progress-dot').forEach((dot, index) => {
                dot.classList.remove('active');
                if (index === currentQuestionIndex) {
                    dot.classList.add('active');
                }
            });

            // Soru bilgilerini göster
            document.getElementById('questionNumber').textContent =
                `Soru ${currentQuestionIndex + 1} / 7 - ${question.label}`;
            document.getElementById('questionText').textContent = question.question;

            // Şıkları karıştır ve göster
            const shuffledOptions = shuffleArray([...question.options]);
            const correctAnswer = question.options[0]; // İlk şık her zaman doğru

            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            shuffledOptions.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option;
                btn.onclick = () => selectAnswer(option, correctAnswer, btn);
                optionsContainer.appendChild(btn);
            });
        }

        // Cevap seç
        function selectAnswer(selected, correct, clickedBtn) {
            if (answered) return;
            answered = true;

            const isCorrect = selected === correct;
            const allBtns = document.querySelectorAll('.option-btn');

            // Tüm butonları devre dışı bırak
            allBtns.forEach(btn => {
                btn.style.pointerEvents = 'none';
                if (btn.textContent === correct) {
                    btn.classList.add('correct');
                }
            });

            if (!isCorrect) {
                clickedBtn.classList.add('wrong');
            }

            // İlerleme noktasını güncelle
            const currentDot = document.getElementById(`dot-${currentQuestionIndex}`);
            if (isCorrect) {
                currentDot.classList.add('correct');
                correctAnswers++;

                // Son soru mu kontrol et
                setTimeout(() => {
                    if (currentQuestionIndex === selectedQuestions.length - 1) {
                        showEndScreen(true);
                    } else {
                        document.getElementById('nextBtn').classList.add('visible');
                    }
                }, 500);
                setTimeout(() => {
                    nextQuestion();
                }, 2500);
            } else {
                currentDot.classList.add('wrong');
                setTimeout(() => {
                    showEndScreen(false);
                }, 3000);
            }
        }

        // Sonraki soru
        function nextQuestion() {
            currentQuestionIndex++;
            showQuestion();
        }

        // Bitiş ekranını göster
        function showEndScreen(won) {
            const endScreen = document.getElementById('endScreen');
            const resultIcon = document.getElementById('resultIcon');
            const resultTitle = document.getElementById('resultTitle');
            const resultText = document.getElementById('resultText');

            if (autoRestartTimeout) {
                clearTimeout(autoRestartTimeout);
                autoRestartTimeout = null;
            }

            if (won) {
                resultIcon.textContent = '🎉';
                resultTitle.textContent = 'TEBRİKLER! 🏆';
                resultText.textContent = `Tüm soruları doğru bildiniz!\n7/7 doğru cevap!\n\nÖdülünüzü almayı unutmayın! 🎁`;
                createConfetti();
            } else {
                resultIcon.textContent = '😔';
                resultTitle.textContent = 'Maalesef!';
                resultText.textContent = `Yanlış cevap verdiniz!\n${correctAnswers}/7 doğru cevap\n\nBir dahaki sefere tekrar deneyin! 💪`;

                // 3 saniye içinde butona basılmazsa otomatik başlangıç ekranına dön.
                autoRestartTimeout = setTimeout(() => {
                    restartQuiz();
                }, 5000);
            }

            endScreen.classList.remove('hidden');
        }

        // Konfeti efekti
        function createConfetti() {
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff'];
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDelay = Math.random() * 2 + 's';
                    document.getElementById('endScreen').appendChild(confetti);

                    setTimeout(() => confetti.remove(), 3000);
                }, i * 50);
            }
        }

        // Yeniden başlat
        function restartQuiz() {
            if (autoRestartTimeout) {
                clearTimeout(autoRestartTimeout);
                autoRestartTimeout = null;
            }

            document.getElementById('endScreen').classList.add('hidden');
            document.getElementById('startScreen').classList.remove('hidden');
        }

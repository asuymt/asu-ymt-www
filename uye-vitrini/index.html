<!doctype html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
  <link rel="icon" href="/assets/images/asuymt-logo.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yönetim Kadrosu | ASÜ-YMT</title>
    <link rel="stylesheet" href="../assets/css/globals.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/theme.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <style>
        .showcase-container {
            max-width: 1400px;
            margin: 8rem auto;
            padding: 0 2rem;
        }

        .showcase-header {
            text-align: center;
            margin-bottom: 6rem;
        }

        .showcase-header h1 {
            font-size: 4.5rem;
            font-weight: 900;
            background: linear-gradient(to right, #fff, #0ea5e9);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
            margin-bottom: 1rem;
        }

        .showcase-grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(200px, 1fr));
            gap: 2.5rem;
        }

        .member-card {
            background: rgba(6, 14, 24, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(16px);
            border-radius: 26px;
            padding: 2rem 2rem 2.4rem;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            background: none;
            height: 440px;
            /* Scroll reveal */
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 0.5s ease, transform 0.5s ease, box-shadow 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .member-card.card-visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Border sweep - yukarıdan aşağıya mavi border animasyonu */
        .member-card .border-sweep {
            position: absolute;
            inset: -3px;
            border-radius: 28px;
            pointer-events: none;
            z-index: 2;
            border: 5px solid #ffffff;
            clip-path: inset(0 0 100% 0);
            transition: clip-path 0.5s ease;
        }

        .member-card:hover .border-sweep {
            clip-path: inset(0 0 0 0);
        }

        .member-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: var(--card-image);
            background-size: cover;
            background-position: center;
            filter: grayscale(1) contrast(1.05) brightness(0.9);
            z-index: 0;
        }

        .member-card::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(180deg, rgba(4, 8, 16, 0.2), rgba(4, 8, 16, 0.92)),
                linear-gradient(90deg, rgba(14, 165, 233, 0.25), rgba(14, 165, 233, 0) 40%);
            border-top: 2px solid rgba(14, 165, 233, 0.65);
            border-radius: 22px;
            pointer-events: none;
            z-index: 0;
        }

        .member-card > * {
            position: relative;
            z-index: 1;
        }

        .member-card:hover {
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4), 0 0 30px rgba(14, 165, 233, 0.15);
        }

        .member-card.featured {
            position: relative;
            top: -35px !important;
            margin-bottom: 35px;
            margin-top: -15px;
            border-color: rgba(14, 165, 233, 0.6) !important;
            box-shadow: 0 35px 80px rgba(14, 165, 233, 0.4);
            z-index: 10;
        }

        /* Peak-in-the-middle layout for 5 cards per row */
        .showcase-grid .member-card:nth-child(5n+1),
        .showcase-grid .member-card:nth-child(5n+5) {
            transform: none;
            top: 25px;
            position: relative;
        }
        .showcase-grid .member-card:nth-child(5n+2),
        .showcase-grid .member-card:nth-child(5n+4) {
            transform: none;
            top: 8px;
            position: relative;
        }
        .showcase-grid .member-card:nth-child(5n+3) {
            transform: none;
            top: -10px;
            position: relative;
        }

        @media (max-width: 1200px) {
            .showcase-grid .member-card {
                height: 440px;
                transform: none;
            }
        }

        .member-card:hover::before {
            filter: grayscale(0.9) contrast(1.1) brightness(1);
        }

        .member-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            position: relative;
            flex-direction: column;
            text-align: center;
            margin-top: 0.6rem;
        }

        .member-img {
            width: 100px;
            height: 100px;
            border-radius: 25px;
            object-fit: cover;
            border: 3px solid var(--accent);
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }


        /* Bio Modal Styles */
        #bioModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(4, 6, 10, 0.98);
            backdrop-filter: blur(25px) saturate(0%);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.5s ease;
        }

        .modal-content {
            background: rgba(15, 15, 20, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4rem;
            border-radius: 40px;
            max-width: 600px;
            width: 90%;
            text-align: center;
            position: relative;
            animation: modalIn 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
        }

        @keyframes modalIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-img {
            width: 150px;
            height: 150px;
            border-radius: 40px;
            margin-bottom: 2rem;
            border: 3px solid rgba(255, 255, 255, 0.15);
            object-fit: cover;
            object-position: center;
            display: block;
            margin-left: auto;
            margin-right: auto;
            filter: grayscale(1) contrast(1.1) brightness(1.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            transition: filter 0.5s ease;
        }
        
        .modal-img:hover {
            filter: grayscale(0) contrast(1) brightness(1);
        }

        .modal-bio {
            font-size: 1.15rem;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.75);
            margin: 2rem 0;
            font-weight: 400;
            max-width: 500px;
        }

        .modal-role {
            color: rgba(255, 255, 255, 0.5);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.9rem;
            margin-top: -0.5rem;
            margin-bottom: 1rem;
        }

        .close-modal {
            position: absolute;
            top: 2.5rem;
            right: 2.5rem;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
        }

        .close-modal:hover { 
            color: white;
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(90deg);
        }

        .member-meta h2 {
            font-size: 2.1rem;
            color: white;
            margin-bottom: 0.3rem;
            letter-spacing: -0.7px;
        }

        .member-meta span {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2.1px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.3rem 0.85rem;
            border-radius: 999px;
            display: inline-block;
        }

        .member-highlight {
            font-size: 0.98rem;
            color: var(--text-secondary);
            line-height: 1.7;
            font-style: normal;
            opacity: 0.9;
            padding: 0.9rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.04);
        }


        .projects-trigger-btn,
        .bio-trigger-btn {
            width: 100%;
            padding: 1.2rem;
            background: rgba(14, 165, 233, 0.1);
            border: 1px solid rgba(14, 165, 233, 0.2);
            border-radius: 15px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
            letter-spacing: 0.2px;
        }

        .projects-trigger-btn:hover,
        .bio-trigger-btn:hover {
            background: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.2);
        }

        .card-cta-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            margin-top: auto;
            margin-bottom: 0;
        }

        .card-cta-group .projects-trigger-btn,
        .card-cta-group .bio-trigger-btn {
            margin-top: 0;
            padding: 1rem 0.9rem;
            font-size: 0.95rem;
            width: 70%;
            max-width: 260px;
        }

        .card-cta-group .projects-trigger-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .card-cta-group .projects-trigger-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .card-cta-group .projects-trigger-btn,
        .card-cta-group .bio-trigger-btn {
            border-radius: 14px;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1.6px;
        }

        .bio-trigger-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .bio-trigger-btn::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.16), transparent);
            transform: translateX(-120%);
            transition: transform 0.5s ease;
        }

        .bio-trigger-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.45);
        }

        .bio-trigger-btn:hover::after {
            transform: translateX(120%);
        }

        .bio-trigger-btn i {
            font-size: 1.1rem;
        }

        /* Project Modal Specifics */
        .project-modal-list {
            display: grid;
            gap: 1.5rem;
            text-align: left;
            margin-top: 2rem;
        }

        .project-modal-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-decoration: none;
            transition: all 0.3s;
        }

        .project-modal-item:hover {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(10px);
        }

        .project-modal-item h5 {
            color: white;
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
        }

        .card-actions {
            margin-top: 0.2rem;
            display: flex;
            justify-content: center;
            gap: 0.9rem;
            padding-top: 0;
        }

        .github-btn {
            color: white;
            font-size: 1.5rem;
            transition: all 0.3s;
            opacity: 0.6;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.22);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 12px rgba(14, 165, 233, 0.15);
        }

        .github-btn:hover {
            opacity: 1;
            color: white;
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.55);
            box-shadow: 0 10px 22px rgba(255, 255, 255, 0.15);
        }

        .decoration-glow {
            position: absolute;
            top: -25%;
            right: -25%;
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.22) 0%, transparent 70%);
            opacity: 0.08;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        .member-card:hover .decoration-glow {
            opacity: 0.15;
        }

        @media (max-width: 1200px) {
            .showcase-grid { grid-template-columns: repeat(2, minmax(220px, 1fr)); }
        }

        @media (max-width: 768px) {
            .showcase-header h1 { font-size: 3rem; }
            .showcase-grid { grid-template-columns: 1fr; }
            .member-card { padding: 2rem; }
            .card-cta-group { width: 100%; }
            .card-cta-group .projects-trigger-btn,
            .card-cta-group .bio-trigger-btn { width: 100%; max-width: none; }
        }
    </style>
</head>
<body>
    <canvas id="particleCanvas" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-3; pointer-events:none;"></canvas>
    
    <div class="container">
        <div class="navbar-placeholder"></div>

        <div class="showcase-container">
            <div class="showcase-header animate__animated animate__fadeIn">
                <h1>Yönetim Kadrosu</h1>
            </div>

            <div class="showcase-grid" id="showcaseGrid"></div>
        </div>

        <!-- Bio Modal -->
        <div id="bioModal">
            <div class="modal-content">
                <span class="close-modal" id="closeModal">&times;</span>
                <img id="modalImg" class="modal-img" src="" alt="">
                <h2 id="modalName"></h2>
                <span id="modalRole" class="modal-role"></span>
                <p id="modalBio" class="modal-bio"></p>
                <div class="card-actions" style="justify-content: center;">
                    <a id="modalGithub" href="#" target="_blank" class="github-btn" style="opacity: 1; font-size: 2rem;">
                        <i class="fab fa-github"></i>
                    </a>
                    <a id="modalInstagram" href="#" target="_blank" class="github-btn" style="opacity: 1; font-size: 2rem; margin-left: 1rem;">
                        <i class="fab fa-instagram"></i>
                    </a>
                    <a id="modalLinkedin" href="#" target="_blank" class="github-btn" style="opacity: 1; font-size: 2rem; margin-left: 1rem;">
                        <i class="fab fa-linkedin-in"></i>
                    </a>
                </div>
            </div>
        </div>

        <!-- Projects Modal -->
        <div id="projectsModal" class="modal" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(4, 6, 10, 0.98); backdrop-filter: blur(25px) saturate(0%); z-index: 10001; display: none; align-items: center; justify-content: center;">
            <div class="modal-content" style="max-width: 500px;">
                <span class="close-modal" id="closeProjects">&times;</span>
                <h2 style="color: white; font-size: 2.5rem; margin-bottom: 0.5rem;">Projeler</h2>
                <span id="projectMemberName" style="color: var(--accent); font-weight: 700; font-size: 1.2rem;"></span>
                <div id="modalProjectsList" class="project-modal-list"></div>
            </div>
        </div>

        <div class="footer"></div>
    </div>

    <script src="../assets/js/particles.js"></script>
    <script src="./showcase-data.js"></script>
    <script src="../assets/js/headerfooter.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('showcaseGrid');
            const members = [...showcaseData];
            const featuredIndex = members.findIndex(m => (m.role || "").toLowerCase().includes("başkan"));
            if (featuredIndex >= 0) {
                const [featured] = members.splice(featuredIndex, 1);
                const insertAt = 2; // Always place at index 2 (3rd position) for middle of first row
                members.splice(insertAt, 0, featured);
            }

            members.forEach((member, index) => {
                const card = document.createElement('div');
                card.className = 'member-card';
                card.style.setProperty('--card-image', `url('${member.image}')`);
                if ((member.role || "").toLowerCase() === "topluluk başkanı") {
                    card.classList.add('featured');
                }
                
                const projectsHtml = member.projects.map(p => `
                    <a href="${p.link}" class="project-mini-item">
                        <h5>${p.title}</h5>
                        <div class="project-mini-tech">
                            ${p.tech.map(t => `<span class="mini-tech-tag">${t}</span>`).join('')}
                        </div>
                    </a>
                `).join('');

                card.innerHTML = `
                    <div class="border-sweep"></div>
                    <div class="decoration-glow"></div>
                    <div class="member-info">
                        <div class="member-meta">
                            <h2>${member.name}</h2>
                            <div style="display: flex; flex-direction: column; align-items: center; gap: 0.5rem;">
                                <span>${member.role}</span>
                                ${member.role2 ? `<span>${member.role2}</span>` : ''}
                                ${member.role3 ? `<span>${member.role3}</span>` : ''}
                            </div>
                        </div>
                    </div>
                    

                    <div class="card-cta-group">
                        <button class="projects-trigger-btn" onclick="openProjects(${member.id})">
                            Projeler
                        </button>

                        ${member.bio ? `
                        <button class="bio-trigger-btn" onclick="openBio(${member.id})">
                            Otobiyografi
                        </button>` : `<div></div>`}
                    </div>
                    <div class="card-actions">
                        ${member.github ? `
                        <a href="${member.github}" target="_blank" class="github-btn" title="GitHub">
                            <i class="fab fa-github"></i>
                        </a>` : ''}
                        ${member.instagram ? `
                        <a href="${member.instagram}" target="_blank" class="github-btn" title="Instagram" style="margin-left: 0.75rem;">
                            <i class="fab fa-instagram"></i>
                        </a>` : ''}
                        ${member.linkedin ? `
                        <a href="${member.linkedin}" target="_blank" class="github-btn" title="LinkedIn" style="margin-left: 0.75rem;">
                            <i class="fab fa-linkedin-in"></i>
                        </a>` : ''}
                    </div>
                `;

                grid.appendChild(card);
            });

            // Scroll ile kartları göster/gizle
            const cards = document.querySelectorAll('.member-card');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('card-visible');
                    } else {
                        entry.target.classList.remove('card-visible');
                    }
                });
            }, {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            });

            cards.forEach(card => observer.observe(card));

            // Modal Logic
            const bioModal = document.getElementById('bioModal');
            const projectsModal = document.getElementById('projectsModal');
            const closeBio = document.getElementById('closeModal');
            const closeProjects = document.getElementById('closeProjects');
            
            window.openBio = (id) => {
                const member = showcaseData.find(m => m.id === id);
                if(!member || !member.bio) return;
                
                document.getElementById('modalImg').src = member.image;
                document.getElementById('modalName').textContent = member.name;
                
                // Modal rol kısmını güncelle (baloncuk stili)
                const modalRole = document.getElementById('modalRole');
                const badgeStyle = `
                    display: inline-block;
                    color: rgba(255, 255, 255, 0.9);
                    font-weight: 700;
                    font-size: 0.85rem;
                    text-transform: uppercase;
                    letter-spacing: 2.1px;
                    background: rgba(255, 255, 255, 0.08);
                    border: 1px solid rgba(255, 255, 255, 0.2);
                    padding: 0.3rem 0.85rem;
                    border-radius: 999px;
                `;
                let rolesHtml = `<span style="${badgeStyle}">${member.role}</span>`;
                if(member.role2) rolesHtml += `<span style="${badgeStyle}">${member.role2}</span>`;
                if(member.role3) rolesHtml += `<span style="${badgeStyle}">${member.role3}</span>`;
                modalRole.innerHTML = rolesHtml;
                modalRole.style.display = 'flex';
                modalRole.style.flexDirection = 'column';
                modalRole.style.alignItems = 'center';
                modalRole.style.gap = '0.5rem';
                modalRole.style.marginTop = '1rem';
                
                document.getElementById('modalBio').textContent = member.bio;
                const modalGithub = document.getElementById('modalGithub');
                const modalInstagram = document.getElementById('modalInstagram');
                const modalLinkedin = document.getElementById('modalLinkedin');
                modalGithub.href = member.github || "#";
                modalGithub.style.display = member.github ? "inline-block" : "none";
                modalInstagram.href = member.instagram || "#";
                modalInstagram.style.display = member.instagram ? "inline-block" : "none";
                modalLinkedin.href = member.linkedin || "#";
                modalLinkedin.style.display = member.linkedin ? "inline-block" : "none";
                
                bioModal.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            };

            window.openProjects = (id) => {
                const member = showcaseData.find(m => m.id === id);
                if(!member || !member.projects) return;

                document.getElementById('projectMemberName').textContent = member.name;
                const list = document.getElementById('modalProjectsList');
                list.innerHTML = member.projects.map(p => `
                    <a href="${p.link}" class="project-modal-item">
                        <h5>${p.title}</h5>
                        <div class="project-mini-tech">
                            ${p.tech.map(t => `<span class="mini-tech-tag">${t}</span>`).join('')}
                        </div>
                    </a>
                `).join('');

                projectsModal.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            };

            closeBio.onclick = () => {
                bioModal.style.display = 'none';
                if (projectsModal.style.display !== 'flex') document.body.style.overflow = 'auto';
            };

            closeProjects.onclick = () => {
                projectsModal.style.display = 'none';
                if (bioModal.style.display !== 'flex') document.body.style.overflow = 'auto';
            };

            window.onclick = (e) => {
                if (e.target === bioModal) closeBio.onclick();
                if (e.target === projectsModal) closeProjects.onclick();
            };
        });
    </script>
</body>
</html>

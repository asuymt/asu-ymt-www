<!doctype html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Üye Vitrini | ASÜ-YMT</title>
    <link rel="icon" sizes="64x64" href="../../assets/images/Logo-64.png" type="image/png" />
    <link rel="stylesheet" href="../../assets/css/globals.css" />
    <link rel="stylesheet" href="../../assets/css/style.css" />
    <link rel="stylesheet" href="../../assets/css/theme.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <style>
        .showcase-container {
            max-width: 1400px;
            margin: 8rem auto;
            padding: 0 2rem;
        }

        .showcase-header {
            text-align: center;
            margin-bottom: 6rem;
        }

        .showcase-header h1 {
            font-size: 4.5rem;
            font-weight: 900;
            background: linear-gradient(to right, #fff, #0ea5e9);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
            margin-bottom: 1rem;
        }

        .showcase-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 2.5rem;
        }

        .member-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 3rem;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .member-card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4);
        }

        .member-info {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .member-img {
            width: 100px;
            height: 100px;
            border-radius: 25px;
            object-fit: cover;
            border: 3px solid var(--accent);
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .member-img:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 0 30px var(--accent);
        }

        /* Bio Modal Styles */
        #bioModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(1, 10, 31, 0.95);
            backdrop-filter: blur(15px);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            padding: 4rem;
            border-radius: 40px;
            max-width: 600px;
            width: 90%;
            text-align: center;
            position: relative;
            animation: modalIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-img {
            width: 150px;
            height: 150px;
            border-radius: 40px;
            margin-bottom: 2rem;
            border: 4px solid var(--accent);
        }

        .modal-bio {
            font-size: 1.3rem;
            line-height: 1.7;
            color: var(--text-primary);
            margin: 2rem 0;
        }

        .close-modal {
            position: absolute;
            top: 2rem;
            right: 2rem;
            font-size: 2.5rem;
            cursor: pointer;
            color: var(--text-muted);
        }

        .close-modal:hover { color: white; }

        .member-meta h2 {
            font-size: 2rem;
            color: white;
            margin-bottom: 0.3rem;
        }

        .member-meta span {
            color: var(--accent);
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .member-highlight {
            font-size: 1.2rem;
            color: var(--text-secondary);
            line-height: 1.6;
            font-style: italic;
            opacity: 0.8;
            padding-left: 1rem;
            border-left: 3px solid var(--accent);
        }

        .projects-trigger-btn {
            width: 100%;
            padding: 1.2rem;
            background: rgba(14, 165, 233, 0.1);
            border: 1px solid rgba(14, 165, 233, 0.2);
            border-radius: 15px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
        }

        .projects-trigger-btn:hover {
            background: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.2);
        }

        /* Project Modal Specifics */
        .project-modal-list {
            display: grid;
            gap: 1.5rem;
            text-align: left;
            margin-top: 2rem;
        }

        .project-modal-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-decoration: none;
            transition: all 0.3s;
        }

        .project-modal-item:hover {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(10px);
        }

        .project-modal-item h5 {
            color: white;
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
        }

        .card-actions {
            margin-top: auto;
            display: flex;
            justify-content: flex-end;
        }

        .github-btn {
            color: white;
            font-size: 1.5rem;
            transition: all 0.3s;
            opacity: 0.6;
        }

        .github-btn:hover {
            opacity: 1;
            color: var(--accent);
            transform: rotate(15deg) scale(1.2);
        }

        .decoration-glow {
            position: absolute;
            top: -20%;
            right: -20%;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            opacity: 0.05;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        .member-card:hover .decoration-glow {
            opacity: 0.15;
        }

        @media (max-width: 768px) {
            .showcase-header h1 { font-size: 3rem; }
            .showcase-grid { grid-template-columns: 1fr; }
            .member-card { padding: 2rem; }
        }
    </style>
</head>
<body>
    <canvas id="particleCanvas" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-3; pointer-events:none;"></canvas>
    
    <div class="container">
        <div id="header-placeholder"></div>

        <div class="showcase-container">
            <div class="showcase-header animate__animated animate__fadeIn">
                <h1>Üye Vitrini</h1>
                <p>Topluluğumuzdaki yetenekli yazılımcıların geliştirdiği projeler ve başarı hikayeleri.</p>
            </div>

            <div class="showcase-grid" id="showcaseGrid"></div>
        </div>

        <!-- Bio Modal -->
        <div id="bioModal">
            <div class="modal-content">
                <span class="close-modal" id="closeModal">&times;</span>
                <img id="modalImg" class="modal-img" src="" alt="">
                <h2 id="modalName"></h2>
                <span id="modalRole" style="color: var(--accent); font-weight: 700;"></span>
                <p id="modalBio" class="modal-bio"></p>
                <div class="card-actions" style="justify-content: center;">
                    <a id="modalGithub" href="#" target="_blank" class="github-btn" style="opacity: 1; font-size: 2rem;">
                        <i class="fab fa-github"></i>
                    </a>
                </div>
            </div>
        </div>

        <!-- Projects Modal -->
        <div id="projectsModal" class="modal" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(1, 10, 31, 0.95); backdrop-filter: blur(15px); z-index: 10001; display: none; align-items: center; justify-content: center;">
            <div class="modal-content" style="max-width: 500px;">
                <span class="close-modal" id="closeProjects">&times;</span>
                <h2 style="color: white; font-size: 2.5rem; margin-bottom: 0.5rem;">Projeler</h2>
                <span id="projectMemberName" style="color: var(--accent); font-weight: 700; font-size: 1.2rem;"></span>
                <div id="modalProjectsList" class="project-modal-list"></div>
            </div>
        </div>

        <div id="footer-placeholder"></div>
    </div>

    <script src="../../assets/js/particles.js"></script>
    <script src="./showcase-data.js"></script>
    <script src="../../assets/js/headerfooter.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('showcaseGrid');
            
            showcaseData.forEach((member, index) => {
                const card = document.createElement('div');
                card.className = 'member-card animate__animated animate__fadeInUp';
                card.style.animationDelay = `${index * 0.1}s`;
                
                const projectsHtml = member.projects.map(p => `
                    <a href="${p.link}" class="project-mini-item">
                        <h5>${p.title}</h5>
                        <div class="project-mini-tech">
                            ${p.tech.map(t => `<span class="mini-tech-tag">${t}</span>`).join('')}
                        </div>
                    </a>
                `).join('');

                card.innerHTML = `
                    <div class="decoration-glow"></div>
                    <div class="member-info">
                        <img src="${member.image}" class="member-img" alt="${member.name}" onclick="openBio(${member.id})">
                        <div class="member-meta">
                            <h2>${member.name}</h2>
                            <span>${member.role}</span>
                        </div>
                    </div>
                    
                    <div class="member-highlight">
                        "${member.highlight}"
                    </div>

                    <button class="projects-trigger-btn" onclick="openProjects(${member.id})">
                        <i class="fas fa-rocket"></i> Öne Çıkan Projeler
                    </button>

                    <div class="card-actions">
                        <a href="${member.github}" target="_blank" class="github-btn" title="GitHub">
                            <i class="fab fa-github"></i>
                        </a>
                    </div>
                `;
                grid.appendChild(card);
            });

            // Modal Logic
            const bioModal = document.getElementById('bioModal');
            const projectsModal = document.getElementById('projectsModal');
            const closeBio = document.getElementById('closeModal');
            const closeProjects = document.getElementById('closeProjects');
            
            window.openBio = (id) => {
                const member = showcaseData.find(m => m.id === id);
                if(!member || !member.bio) return;
                
                document.getElementById('modalImg').src = member.image;
                document.getElementById('modalName').textContent = member.name;
                document.getElementById('modalRole').textContent = member.role;
                document.getElementById('modalBio').textContent = member.bio;
                document.getElementById('modalGithub').href = member.github;
                
                bioModal.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            };

            window.openProjects = (id) => {
                const member = showcaseData.find(m => m.id === id);
                if(!member || !member.projects) return;

                document.getElementById('projectMemberName').textContent = member.name;
                const list = document.getElementById('modalProjectsList');
                list.innerHTML = member.projects.map(p => `
                    <a href="${p.link}" class="project-modal-item">
                        <h5>${p.title}</h5>
                        <div class="project-mini-tech">
                            ${p.tech.map(t => `<span class="mini-tech-tag">${t}</span>`).join('')}
                        </div>
                    </a>
                `).join('');

                projectsModal.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            };

            closeBio.onclick = () => {
                bioModal.style.display = 'none';
                if (projectsModal.style.display !== 'flex') document.body.style.overflow = 'auto';
            };

            closeProjects.onclick = () => {
                projectsModal.style.display = 'none';
                if (bioModal.style.display !== 'flex') document.body.style.overflow = 'auto';
            };

            window.onclick = (e) => {
                if (e.target === bioModal) closeBio.onclick();
                if (e.target === projectsModal) closeProjects.onclick();
            };
        });
    </script>
</body>
</html>
